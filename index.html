<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NewProducts &middot; Dashboard</title>
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <div class="app">
      <div id="topbar"></div>

      <main class="main">
        <section class="hero">
          <h1>Jewelry Product Development</h1>
          <p>
            A static prototype for managing master designs, costing tables,
            specifications and product SKUs. Data lives in your browser only.
          </p>
        </section>

        <div class="page-header">
          <div>
            <h1>Modules</h1>
            <p>Pick a workspace to start.</p>
          </div>
          <button class="btn btn-ghost" id="reset-all">Reset all sample data</button>
        </div>

        <div class="cards" id="module-cards"></div>
      </main>

      <div id="footer"></div>
    </div>

    <script src="shared/sample-data.js"></script>
    <script src="shared/storage.js"></script>
    <script src="assets/app.js"></script>
    <script>
      App.renderNav("dashboard");
      App.renderFooter();

      var DESCRIPTIONS = {
        "master-designs": {
          title: "Master Designs",
          desc: "The library of approved designs. Source of truth for style codes, stones and metals.",
          dataKey: "masterDesigns"
        },
        "stone-cost-tables": {
          title: "Stone Cost Tables",
          desc: "Reference costs for diamonds and gemstones by shape, size and quality.",
          dataKey: "stoneCostTables"
        },
        "labour-cost-templates": {
          title: "Labour Cost Templates",
          desc: "Reusable factory labour templates for casting, setting and finishing.",
          dataKey: "labourCostTemplates"
        },
        "product-development": {
          title: "Product Development",
          desc: "Track new products from idea through CAD, prototyping, costing and launch.",
          dataKey: "productDevelopment"
        },
        "specifications": {
          title: "Specifications",
          desc: "Reusable rule-sets for metal, finish, stone quality and sizing.",
          dataKey: "specifications"
        },
        "products": {
          title: "Products",
          desc: "Final SKUs, linked to a master design, with calculated cost placeholders.",
          dataKey: "products"
        }
      };

      var holder = document.getElementById("module-cards");
      var html = App.MODULES.filter(function (m) { return m.key !== "dashboard"; })
        .map(function (m) {
          var meta = DESCRIPTIONS[m.key] || { title: m.label, desc: "", dataKey: null };
          var count = meta.dataKey ? Storage.load(meta.dataKey).length : 0;
          return (
            '<a class="card-link" href="' + m.path + 'index.html">' +
            '<div class="card">' +
              '<h3>' + App.escapeHtml(meta.title) + '</h3>' +
              '<p>' + App.escapeHtml(meta.desc) + '</p>' +
              '<div class="card-meta">' +
                '<span>' + count + ' record' + (count === 1 ? '' : 's') + '</span>' +
                '<span>Open &rsaquo;</span>' +
              '</div>' +
            '</div>' +
            '</a>'
          );
        }).join("");
      holder.innerHTML = html;

      document.getElementById("reset-all").addEventListener("click", function () {
        if (confirm("Reset every module back to sample data? Local edits will be lost.")) {
          Storage.resetAll();
          location.reload();
        }
      });
    </script>
  </body>
</html>
