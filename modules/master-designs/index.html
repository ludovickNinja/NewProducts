<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Master Designs &middot; NewProducts</title>
    <link rel="stylesheet" href="../../assets/styles.css" />
  </head>
  <body>
    <div class="app">
      <div id="topbar"></div>

      <main class="main wide-main">
        <div class="page-header">
          <div>
            <h1>Master Designs</h1>
            <p>Source-of-truth library for parent jewelry design templates. Products are generated from approved Master Designs.</p>
          </div>
          <div style="display:flex; gap:8px;">
            <button class="btn btn-ghost" id="reset-btn">Reset</button>
            <button class="btn btn-primary" id="add-btn">Add Master Design</button>
          </div>
        </div>

        <div class="filters">
          <div class="filters-row">
            <input
              id="search"
              class="input grow"
              type="search"
              placeholder="Search by Master ID, style code, design name, collection, category, type..."
            />
            <div class="segmented" role="tablist" aria-label="View mode">
              <button class="btn btn-sm" id="view-table" type="button">Table View</button>
              <button class="btn btn-sm" id="view-card" type="button">Card View</button>
            </div>
          </div>
          <div class="filters-row">
            <label class="filter-field">
              <span>Status</span>
              <select id="filter-status" class="select">
                <option value="">All</option>
                <option>Draft</option>
                <option>In Review</option>
                <option>Approved</option>
                <option>Active</option>
                <option>Retired</option>
              </select>
            </label>
            <label class="filter-field">
              <span>Collection</span>
              <select id="filter-collection" class="select"></select>
            </label>
            <label class="filter-field">
              <span>Category</span>
              <select id="filter-category" class="select"></select>
            </label>
            <label class="filter-field">
              <span>Type</span>
              <select id="filter-type" class="select"></select>
            </label>
            <label class="filter-field">
              <span>Center Shape</span>
              <select id="filter-center-shape" class="select"></select>
            </label>
            <button class="btn btn-ghost" id="clear-filters" type="button">Clear</button>
          </div>
        </div>

        <div class="table-wrap" id="table-view-wrap">
          <table>
            <thead>
              <tr>
                <th>Master ID</th>
                <th>Style Code</th>
                <th>Design Name</th>
                <th>Collection</th>
                <th>Category</th>
                <th>Type</th>
                <th>Center Stone</th>
                <th>Status</th>
                <th>Last Updated</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="list-body"></tbody>
          </table>
        </div>

        <div class="master-cards" id="card-view-wrap" style="display:none"></div>
        <div class="empty" id="list-empty" style="display:none"></div>
      </main>

      <div id="footer"></div>
    </div>

    <dialog id="form-dialog" class="dialog-wide">
      <div class="dialog-header">
        <h2 id="dialog-title">Add Master Design</h2>
      </div>
      <form id="form">
        <div class="dialog-body">
          <div id="form-sections"></div>
        </div>
        <div class="dialog-footer">
          <button type="button" class="btn btn-ghost" id="form-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </dialog>

    <script src="../../shared/sample-data.js"></script>
    <script src="../../shared/storage.js"></script>
    <script src="../../assets/app.js"></script>
    <script src="master-designs.js"></script>
  </body>
</html>
